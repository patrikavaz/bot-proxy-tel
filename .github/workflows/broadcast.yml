name: Proxy Broadcast

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  broadcast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download users artifact (if exists)
        id: download
        run: |
          gh run list --workflow=broadcast.yml --status=success --limit=1 --json databaseId -q '.[0].databaseId' > last_run_id.txt 2>/dev/null || true
          RUN_ID=$(cat last_run_id.txt 2>/dev/null || echo "")
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            gh run download "$RUN_ID" --name users-db --dir . 2>/dev/null || true
          fi
          echo "Done (users.json exists: $(test -f users.json && echo yes || echo no))"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send proxy update to all users
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py broadcast

      - name: Upload users artifact
        uses: actions/upload-artifact@v4
        with:
          name: users-db
          path: users.json
          retention-days: 90
        continue-on-error: true
