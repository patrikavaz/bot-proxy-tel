name: Proxy Broadcast

on:
  schedule:
    - cron: "0 0,12 * * *"   # Every 12 hours: 00:00 and 12:00 UTC
  workflow_dispatch:           # Manual trigger

jobs:
  broadcast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Download users.json from the previous run (so we don't lose subscribers)
      - name: Download users artifact
        uses: actions/download-artifact@v4
        with:
          name: users-db
          path: .
        continue-on-error: true   # First run won't have this yet — that's OK

      - name: Send proxy update to all users
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py broadcast

      # Save updated users.json so next run has it
      - name: Upload users artifact
        uses: actions/upload-artifact@v4
        with:
          name: users-db
          path: users.json
          retention-days: 90
        continue-on-error: true
